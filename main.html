<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="main.css">
    <title>Exo Planet</title>
</head>
<body>

<div class="scanline"></div>
<div class="noise"></div>

<header id="hud-header">
    <div class="hud-title">
        <span class="title-bracket">[</span>EXO<span class="title-accent">PLANET</span><span class="title-bracket">]</span>
    </div>
    <div class="hud-meta">
        <button type="button" id="SaveButton" class="hud-btn">SAVE</button>
        <button type="button" id="LoadButton" class="hud-btn">LOAD</button>
        <div class="status-light"></div>
    </div>
</header>

<!-- ROW 1: Factory network — full width -->
<section class="panel" id="factories-panel">
    <div class="panel-header">
        <span class="panel-label">// FACTORY_NETWORK</span>
        <span class="panel-hint">Scroll to zoom · Space+drag or middle-click to pan · Click output→input port to connect · Click line to delete</span>
    </div>
    <!-- Inventory bar -->
    <div id="factory-inventory-bar"></div>
    <!-- Editor: sidebar + canvas -->
    <div id="factory-editor">
        <div id="factory-sidebar"></div>
        <div id="factory-canvas"><div id="factory-world"></div></div>
    </div>
</section>

<!-- ROW 2: Character stats | Event log -->
<div class="bottom-grid">

    <section class="panel" id="character-panel">
        <div class="panel-header">
            <span class="panel-label">// CHARACTER_STATS</span>
        </div>
        <div class="stats-grid">
            <div class="stat-row">
                <span class="stat-name">PHYSICAL</span>
                <div class="stat-bar-wrap"><div class="stat-bar"></div></div>
                <span class="stat-val" id="physical">1.0</span>
            </div>
            <div class="stat-row">
                <span class="stat-name">MENTAL</span>
                <div class="stat-bar-wrap"><div class="stat-bar"></div></div>
                <span class="stat-val" id="mental">1.0</span>
            </div>
            <div class="stat-row">
                <span class="stat-name">SPIRITUAL</span>
                <div class="stat-bar-wrap"><div class="stat-bar"></div></div>
                <span class="stat-val" id="spiritual">1.0</span>
            </div>
            <div class="stat-row">
                <span class="stat-name">SOCIAL</span>
                <div class="stat-bar-wrap"><div class="stat-bar"></div></div>
                <span class="stat-val" id="social_emotional">1.0</span>
            </div>
            <div class="stat-row">
                <span class="stat-name">ENVIRON.</span>
                <div class="stat-bar-wrap"><div class="stat-bar"></div></div>
                <span class="stat-val" id="environmental">1.0</span>
            </div>
        </div>
    </section>

    <section class="panel" id="event-log-panel">
        <div class="panel-header">
            <span class="panel-label">// COMMS_FEED</span>
        </div>
        <div id="event-log-entries"></div>
    </section>

    <!-- ROW 3: Daily objectives | Checklist -->
    <section class="panel" id="Goals">
        <div class="panel-header">
            <span class="panel-label">// DAILY_OBJECTIVES</span>
        </div>
        <div id="Dailies"></div>
        <div class="add-goal-row">
            <span class="prompt-cursor">&gt;_</span>
            <input type="text" id="newdailyTaskName" placeholder="NEW OBJECTIVE..." autocomplete="off"/>
            <button id="buttonAddDailyTask" class="hud-btn">ADD</button>
        </div>
    </section>

    <section class="panel" id="checklist-panel">
        <div class="panel-header">
            <span class="panel-label">// TASK_LIST</span>
        </div>
        <div id="checklist-items"></div>
        <div class="add-goal-row">
            <span class="prompt-cursor">&gt;_</span>
            <input type="text" id="checklist-add-input" placeholder="NEW TASK..." autocomplete="off"/>
            <button id="checklist-add-btn" class="hud-btn">ADD</button>
        </div>
    </section>

</div>

<script type="module" src="ressources.js"></script>
</body>
</html>
